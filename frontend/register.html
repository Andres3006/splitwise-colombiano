<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Splitwise Colombiano</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <section class="auth-screen">
        <div class="auth-layout auth-layout-single">
            <div class="auth-hero auth-hero-login">
                <p class="eyebrow">Splitwise Colombiano</p>
                <h1>Crea tu cuenta</h1>
            </div>

            <div class="auth-shell">
                <div class="auth-panel auth-card-panel auth-card-panel-single">
                    <h2>Crear cuenta</h2>
                    <form id="register-only-form" class="stack">
                        <input type="text" id="register-name" placeholder="Nombre" required>
                        <input type="email" id="register-email" placeholder="Correo" required>
                        <input type="password" id="register-password" placeholder="Contrasena" required>
                        <input type="date" id="register-birth-date" required>
                        <button type="submit">Registrar usuario</button>
                    </form>
                    <p class="auth-switch">¿Ya tienes cuenta? <a href="/" class="link-button">Iniciar sesión</a></p>
                    <p id="register-message-box" class="register-feedback hidden"></p>
                </div>
            </div>
        </div>
    </section>

    <script src="/register.js"></script>
</body>
</html>
